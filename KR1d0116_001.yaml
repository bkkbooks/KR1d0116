body:
  text: 喪服釋疑文王世子云公素服不舉無其倫之喪無服親哭之諸侯於兄弟服加衰絰此無服但素服不加衰絰禮記文王世子孔頴達正義父之重長子以其當為禰後也其所繼者於父則禰於子則祖也禮記喪服小記正義亡其親者不知其死生則不敢服然則終身不祭乎智曰唯疑其生則不敢服也必疑死焉可不祭乎古之死者必告於廟今亡其親必告其先廟使咸知之求之三年若不得也則又告之者欲令其生也則隨而祏之其後疑祭必告今知其疑不受也鬼死者終歸饗也祝辭以告疑則還廟不遷矣憑陵之心加崇於尊此孝子之心也杜佑通典卷五十一凡屈不得服者皆有心喪之禮小功以下不稅服乃無心喪也通典卷八十一嬰兒無知然於其父母之喪則以縗抱之其餘親八歲則制服矣七年曰悼過此有罪則入於刑必致之於禮故在下殤之年為之制服按小功章昆弟之殤服昆弟之下殤是己下殤之年則行服也同上喪服云庶子不得為長子三年不繼祖也譙周五經然否云小記曰庶子不為長子斬不繼祖與禰也此但別庶子而下言不繼祖者謂庶子身不繼禰故其長子為不繼祖合而言之也通典卷八十八引譙周五經然否云劉智釋疑亦同此議侍中庾純云古者所以重宗諸侯代爵士大夫代祿防其爭競故明其宗今無國士代祿者防無所施又古之嫡孫在士位無代祿之士猶承祖考業上供祭祠下正子孫旁理昆弟敘親合族是以宗人男女長幼皆為之服𪗋縗今則不然諸侯無爵邑者嫡之子卒則其次長攝家主祭嫡孫以長幼齒無復殊制也又未聞今代為宗子服𪗋縗者然則嫡孫於古則有殊制於今則無異等今王侯有爵土者其所防與古無異重嫡之制則不得不同至於大夫以下既與古禮異矣吉不統家凶則統喪考之情禮俱亦有違按律無嫡孫先諸父承財之文宜無承重之制劉智以為此説非從古制也魏晉二代亦自行之通典卷八十二問者曰禮孫無祖後三年者以其當正統也庶子之長孫既不繼曾高祖此孫為庶祖承重三年不答曰繼祖者不唯謂大宗也按喪服傳與小記皆云庶子不為長子三年不繼祖與禰也兩舉之者明父之重長子以其當為禰後也其所繼者於父則禰於子則祖也父以己當繼祖故重其服則孫為祖後者不得輕也然則孫為祖後皆三年矣且甲衆子也生乙乙生景而乙先卒景為長子孫而後甲甲亡景為甲三年則甲是庶子無嫡可傳若不三年則景為乙之嫡子而闕父卒為祖後之義也同上或問曰若祖父先卒父自為之三年己為之服周矣而父卒祖母後卒當服三年不乎劉智答曰嫡孫服祖三年誠以父卒則己不敢不以子道孝於祖為是服三年也謂之受重於祖者父卒則祖當為己服周此則受重也己雖不得受重於祖然祖母今當服己周己不得不為祖母三年也小記曰祖父卒而後為祖母後者三年特為此發也通典卷八十九問曰高曾祖母與祖母俱存其卑者先亡則嘗厭屈不答曰昔魯穆薑在而成公夫人薨春秋書曰葬我小君齊薑舊説云妻隨夫而成尊姑不厭婦婦人不主祭已承先君之正體無疑於服重也同上雖為父後猶為嫁母𪗋縗訖葬卒哭乃除踰月乃祭通典卷九十四親母出則服繼母之黨繼母既卒則不服也通典卷九十五或問禮為人後者為當唯出子一身還本親也魯國孔正陽等議以為人後者服所後之親若子非其本親降一等者以其至其子以義斷不復還本親故也禮云若子者則於本父母不若子矣智又按禮為人後者於兄弟降一等此出子及其子孫皆為人後者也甲無後故乙為之後乙之子孫皆去其親往為甲後皆當稱為人後服本親不傷於後者若子則其孫亦然矣本親有自然之恩降一等足以明所後者為重無緣乃絶之矣通典卷九十六按禮記小記云生不及祖父母諸父昆弟而父稅喪子則不智以為生不相及二文相害必有誤字昆弟相連之語易用為衍至親並代不得以不相見而無相服之恩也若令生不相及者稅服則父雖已除後生者不得追服也凡不服者不服則父雖稅其子孫無緣服也以此推之弟衍字可知也通典卷九十八問云按喪服小記慈母之父母無服孫宜無服慈祖母矣又曰慈母與妾母不代祭孫不祭慈祖母何服之有智曰禮為親母黨服為繼母之黨不服不妨孫服繼祖母也禮孫為祖後如子所言妾母不代祭者據奉之者身終則止耳豈有妾子先亡孫持喪事而終喪便不祭也通典卷九十八遇亂離析計父母之年已過百年可終卒矣而不得音問計同里同年者於其死日便制喪服或以為終身或不許者如何智答曰父母生死未定則凶服不宜在身繼祀為重然則言不宜制服必繼代祀者吾以為得之矣凡服喪而無哀容得以不孝議之處厭降不得服其親而哀情至者吾得以孝篤稱之通典卷九十八問曰今有狂癡之子不識菽麥又不能行步起止子無人道年過二十而死者或以為禮無廢疾之降殺父當正服服之耶以為殤之不服為無所知耶此疾甚於殤非禮服所加也禮之所不及以其從例所知故也不宜服矣此二者將焉從智答曰無服之殤至愛過於成人以其於生性自然未成因斯而不服矣漸至於成人順乎其理者也至於廢疾多感外物而得之父母養之或不盡理而使之然仁人痛深不忍不服故禮不為作降殺不得同殤例也通典卷一百一問曰昆弟骨肉以罪惡徒流死者諸侯有服不智答曰凡以罪惡徒流者絶之國君於兄弟有罪者亦絶也舊説諸侯於兄弟有弔服服縗絰此不服則無縗絰素服而已不弔臨其喪也諸侯之身體先君奉祭祀是以不得盡其情於所絶耳然則不為父後者則服之矣同上問者曰久而不葬喪主不除若其父遠征軍敗死於戰場亡失胅骨無所葬其服如何智云此禮文所不及也以理推之凡禮使為主者不除不謂衆子獨可無哀誠以既變人情必殺喪雖在殯不為主者可以無服然則為主者之服可以哀獨多也以喪柩在不可無凶事之主故也今無所葬是無尸柩也凶禮無施則為後者宜與衆子同除矣訖葬而變者喪之大事畢也若無尸柩則不宜有葬寒暑一周正服之終也是以除首絰而練冠也亡失親之骸骨孝子之情不欲崇也可令因周練乃服變縗絰雖無故事而制之所安也通典卷一百三
